# https://taskfile.dev

version: '3'

env:
  MODULE_PATH: github.com/barnowlsnest/pgqs-harnerss

tasks:
  update:
    env:
      GOPRIVATE: github.com/barnowlsnest/*
    cmds:
      - go mod tidy

  lint:
    cmds:
      - go vet ./...
      - go fmt ./...
      - goimports -l -e -w ./postgres
      - golangci-lint run --fix

  build:
    cmds:
      - go build .